<script>
        const modes = {
            single: {
                title: "输入歌曲 URL 或 ID",
                desc: "支持单曲分享链接或直接输入数字ID",
                placeholder: "在此输入网易云音乐单曲链接或ID",
                showCharts: false,
                showResults: false
            },
            album: {
                title: "输入专辑 URL 或 ID",
                desc: "支持专辑分享链接或直接输入数字ID",
                placeholder: "在此输入网易云音乐专辑链接或ID",
                showCharts: false,
                showResults: false
            },
            lyrics: {
                title: "输入歌单 URL 或 ID",
                desc: "支持歌单分享链接或直接输入数字ID",
                placeholder: "在此输入网易云音乐歌单链接或ID",
                showCharts: false,
                showResults: true,
                resultTitle: '听陈楚生热门精选',
                tag: '歌单',
                count: '共 40 首歌曲'
            },
            search: {
                title: "输入搜索关键词",
                desc: "支持搜索歌曲、歌手、专辑等",
                placeholder: "陈楚生",
                showCharts: false,
                showResults: true,
                resultTitle: '搜索结果: "陈楚生"',
                tag: '搜索',
                count: '共 100 首歌曲'
            },
            charts: {
                title: "选择官方榜单",
                desc: "获取网易云官方实时排行榜数据",
                placeholder: "搜索榜单内的歌曲...",
                showCharts: true,
                showResults: true,
                resultTitle: '飙升榜',
                tag: '榜单',
                count: '共 100 首歌曲'
            }
        };

        function switchMode(modeKey) {
            const config = modes[modeKey];
            
            // Update tabs UI
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.remove('tab-active', 'text-primary');
                tab.classList.add('text-secondary');
            });
            const activeTab = document.querySelector(`.mode-tab[data-mode="${modeKey}"]`);
            activeTab.classList.add('tab-active');
            activeTab.classList.remove('text-secondary');

            // Update Header & Inputs visibility
            const inputHeader = document.getElementById('input-header');
            const standardInputSection = document.getElementById('standard-input-section');
            const chartsSel = document.getElementById('charts-select-container');
            const qualitySel = document.getElementById('quality-selector');

            if (modeKey === 'charts') {
                // Charts specific layout
                inputHeader.classList.add('hidden');
                standardInputSection.classList.add('hidden');
                chartsSel.classList.remove('hidden');
                // Results area should be right below
                document.getElementById('results-area').classList.remove('mt-8');
                document.getElementById('results-area').classList.add('mt-4');
            } else {
                // Standard layout
                inputHeader.classList.remove('hidden');
                standardInputSection.classList.remove('hidden');
                chartsSel.classList.add('hidden');
                document.getElementById('results-area').classList.remove('mt-4');
                document.getElementById('results-area').classList.add('mt-8');
                
                document.getElementById('input-title').innerText = config.title;
                document.getElementById('input-desc').innerText = config.desc;
                document.getElementById('main-input').placeholder = config.placeholder;
            }

            // Show/Hide Results Area
            const resultsArea = document.getElementById('results-area');
            if(config.showResults) {
                resultsArea.classList.remove('hidden');
                document.getElementById('result-header-title').innerText = config.resultTitle;
                document.getElementById('result-tag').innerText = config.tag;
                document.getElementById('result-count').innerText = config.count;
            } else {
                resultsArea.classList.add('hidden');
            }
        }

        window.onload = function() {
            const main = document.querySelector('main');
            main.style.opacity = '1';
        };
    </script>
