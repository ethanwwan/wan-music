# ============================================================
# Wan Music - Docker Compose demo
# ============================================================
# 使用远程镜像（Docker Hub: ethanwwan/wan-music:latest）
# 如需本地构建，可解开下方 build 块，并删除 image 字段
#
# Usage (in project root):
#   docker compose -f docker-compose.yml up -d
#   # 本地构建：
#   docker compose -f docker-compose.yml up -d --build
# ============================================================

services:
  wan-music:
    image: ethanwwan/wan-music:latest
    container_name: wan-music
    restart: unless-stopped
    ports:
      - "6005:6005"
    volumes:
      - cookie-data:/app/clients/cookie
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  cookie-data:
    driver: local
