# ============================================================
# Wan Music - Docker Compose 部署
# ============================================================
# 使用方法：
#   1) docker compose build              本地构建镜像
#   2) docker compose up -d              后台启动服务
#   3) docker compose logs -f            查看日志
#   4) docker compose down               停止服务
#
# 自定义镜像：
#   WAN_MUSIC_IMAGE=ghcr.io/pgwan/wan-music:v1.0.0 docker compose up -d
# ============================================================

services:
  wan-music:
    # 镜像名（可通过环境变量覆盖，例如 ghcr.io 用户名）
    image: ${WAN_MUSIC_IMAGE:-wan-music:latest}
    # 如果指定 WAN_MUSIC_IMAGE 但本地没有，会自动构建
    build:
      context: .
      dockerfile: backend/Dockerfile
      # 容器内端口（构建时 ARG）
      args:
        PORT: ${CONTAINER_PORT:-5002}
    container_name: wan-music
    restart: unless-stopped
    ports:
      # 主机端口:容器端口
      - "${HOST_PORT:-5002}:${CONTAINER_PORT:-5002}"
    environment:
      # 时区
      - TZ=${TZ:-Asia/Shanghai}
      # Python 日志级别
      - PYTHONUNBUFFERED=1
      # Flask 配置
      - FLASK_ENV=production
      # 容器内端口（必须与 build.args.PORT 和 ports 右边一致）
      - PORT=${CONTAINER_PORT:-5002}
    volumes:
      # 持久化 cookie 文件（容器重建后保留登录态）
      - cookie-data:/app/clients/cookie
      # 可选：挂载自定义日志目录
      - ./logs:/app/logs
    healthcheck:
      # 端口从 $PORT 读取（运行时环境变量）
      test: ["CMD", "curl", "-f", "http://localhost:${CONTAINER_PORT:-5002}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # 资源限制（根据服务器配置调整）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 256M
    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cookie-data:
    driver: local
