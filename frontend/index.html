<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 设置referrer策略，确保动态import请求包含referer头 -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Wan Music - 多平台音乐下载</title>
    <meta name="description" content="支持网易云 / QQ 音乐 / 酷狗 / 酷我，搜索歌曲，解析真实下载地址。">

    <!-- 占位样式：避免初始白屏闪烁，App 挂载后会被 global.css 覆盖 -->
    <style>
      :root {
        --color-primary: #0057c2;
        --color-background: #f5f5f5;
        --color-text-muted: #595959;
      }
      html, body { margin: 0; padding: 0; background: var(--color-background); }
      #app { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
