<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 设置referrer策略，确保动态import请求包含referer头 -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>音乐解析工具</title>

    <link rel="stylesheet" id="aplayer-css" href="https://unpkg.com/aplayer@1.10.1/dist/APlayer.min.css">
    <!-- 本地打包模式，无需CDN链接 -->
    <script>
      // 多CDN兜底：unpkg → jsdelivr → bootcdn → cdnjs
      // 任意一个能加载成功即可
      window.__loadAPlayerCSS = function() {
        const cssUrls = [
          'https://unpkg.com/aplayer@1.10.1/dist/APlayer.min.css',
          'https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css',
          'https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.css',
        ];
        const link = document.getElementById('aplayer-css');
        // 监听当前 link 的加载失败事件，自动切换到下一个 CDN
        let index = 0;
        const tryNext = () => {
          if (index >= cssUrls.length) {
            console.warn('[aplayer] 所有CSS CDN都不可用，播放器样式可能异常');
            return;
          }
          link.href = cssUrls[index++];
        };
        link.addEventListener('error', tryNext);
      };
      window.__loadAPlayerCSS();
    </script>
  </head>
  <body>
    <div id="app">
      <!-- 加载动画 -->
      <div id="initial-loader" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--color-background, #F5F7FA);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      ">
        <div style="text-align: center;">
          <div style="
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border, #e4e7ed);
            border-top: 3px solid var(--color-primary, #4F46E5);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
          "></div>
          <p style="color: var(--color-text-muted, #666666); margin: 0;">正在加载音乐解析器...</p>
        </div>
      </div>
      <style>
        :root {
          --color-primary: #4F46E5;
          --color-background: #F5F7FA;
          --color-border: #e4e7ed;
          --color-text-muted: #666666;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    </div>

    <script type="module" src="/src/main.js"></script>

    <!-- 性能优化：延迟加载非关键JS -->
    <script>
      // 多CDN兜底：unpkg → jsdelivr → bootcdn → cdnjs
      // 任意一个能加载成功即可
      window.addEventListener('load', function() {
        const jsUrls = [
          'https://unpkg.com/aplayer@1.10.1/dist/APlayer.min.js',
          'https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.js',
        ];
        let jsIndex = 0;
        const tryLoadJS = () => {
          if (jsIndex >= jsUrls.length) {
            console.error('[aplayer] 所有JS CDN都不可用，播放器功能不可用');
            return;
          }
          const script = document.createElement('script');
          script.src = jsUrls[jsIndex++];
          script.async = true;
          script.onerror = tryLoadJS;  // 一个失败自动试下一个
          script.onload = () => console.log(`[aplayer] JS加载成功: ${script.src}`);
          document.head.appendChild(script);
        };
        tryLoadJS();

        // 移除初始加载动画
        setTimeout(() => {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease';
            setTimeout(() => loader.remove(), 300);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
