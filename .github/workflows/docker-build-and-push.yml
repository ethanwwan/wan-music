name: Docker Build and Push

# ============================================================
# 触发条件：
#   push tag (v*.*.* 或 v*.*.*-*)  → 构建并推送镜像到 Docker Hub
# ============================================================

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

# 避免重复运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker Hub 配置（通过 GitHub Secrets 注入）
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/wan-music

jobs:
  # ============================================================
  # Job 1: 构建并推送镜像（核心任务）
  # ============================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ============================================================
      # 从 tag 提取版本号（去除 v 前缀）
      # 例如 v1.2.3 → version=1.2.3
      # ============================================================
      - name: Compute version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG → version=$VERSION"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # tag 策略（精简到两个 tag）：
          #   push tag v1.2.3      → 1.2.3, latest
          #   push tag v1.2.3-rc1  → 1.2.3-rc1, latest
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Wan Music
            org.opencontainers.image.description=多平台音乐搜索/解析/下载
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 构建缓存：加速重复构建
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 2: 创建 GitHub Release（仅 tag 触发）
  # ============================================================
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (strip v prefix)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## 🐳 Docker 镜像

            镜像已推送到 Docker Hub：

            ```bash
              # 拉取指定版本
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/wan-music:${{ steps.version.outputs.version }}

              # 启动服务
              docker run -d \
                --name wan-music \
                -p 6005:6005 \
                --restart unless-stopped \
                ${{ secrets.DOCKERHUB_USERNAME }}/wan-music:${{ steps.version.outputs.version }}

              # 或使用 docker compose
              WAN_MUSIC_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/wan-music:${{ steps.version.outputs.version }} \
                docker compose up -d
            ```

            **访问地址**：`http://localhost:6005`
