name: Docker Build and Push

# ============================================================
# 触发条件：
#   push tag (v*.*.* 或 v*.*.*-*)  → 构建并推送镜像到 Docker Hub
# ============================================================

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

# 避免重复运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker Hub 配置（通过 GitHub Secrets 注入）
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/wan-music

jobs:
  # ============================================================
  # Job 1: 构建并推送镜像（核心任务）
  # ============================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # tag 策略（去除 v 前缀）：
          #   push tag v1.2.3      → 1.2.3, 1.2, 1, latest
          #   push tag v1.2.3-rc1  → 1.2.3-rc1
          # 注意：enable 必须用原生 ${{ }} 表达式，不能用 {{is_default_branch}} 模板变量
          #      （metadata-action@v5 + Node 24 下模板变量不再展开）
          tags: |
            # 完整版本（去除 v 前缀）：v1.2.3 → 1.2.3
            type=match,pattern=^v(.*)$,value={{1}}
            # 主.次版本：v1.2.3 → 1.2
            type=match,pattern=^v(\d+)\.(\d+).*$,value={{1}}.{{2}}
            # 主版本：v1.2.3 → 1
            type=match,pattern=^v(\d+).*$,value={{1}}
            # latest（每次 tag 推送都会更新到该版本）
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # commit sha 短码
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=Wan Music
            org.opencontainers.image.description=多平台音乐搜索/解析/下载
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 构建缓存：加速重复构建
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 1.5: 同步 README 到 Docker Hub
  # ============================================================
  sync-readme:
    name: Sync README to Docker Hub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          short-description: "Wan Music - 多平台音乐搜索、解析、下载工具"
          readme-filepath: ./README.md

  # ============================================================
  # Job 2: 创建 GitHub Release（仅 tag 触发）
  # ============================================================
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (strip v prefix)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## 🐳 Docker 镜像

            镜像已推送到 Docker Hub：

            ```bash
              # 拉取指定版本
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/wan-music:${{ steps.version.outputs.version }}

              # 启动服务
              docker run -d \
                --name wan-music \
                -p 6005:6005 \
                --restart unless-stopped \
                ${{ secrets.DOCKERHUB_USERNAME }}/wan-music:${{ steps.version.outputs.version }}

              # 或使用 docker compose
              WAN_MUSIC_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/wan-music:${{ steps.version.outputs.version }} \
                docker compose up -d
            ```

            **访问地址**：`http://localhost:6005`
